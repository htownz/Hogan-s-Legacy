services:
  policy-intel:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run dev:policy-intel:container
    env_file:
      - ./.env.policy-intel
    ports:
      - "5050:5050"
    volumes:
      - .:/workspace
      - /workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5050/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  policy-intel-ui:
    build:
      context: ./client-policy-intel
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0
    working_dir: /workspace/client-policy-intel
    env_file:
      - ./.env.policy-intel
    ports:
      - "5173:5173"
    volumes:
      - ./client-policy-intel:/workspace/client-policy-intel
      - policy-intel-ui-node-modules:/workspace/client-policy-intel/node_modules
    depends_on:
      policy-intel:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/index.html').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: actup_policy_intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d actup_policy_intel"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
  policy-intel-ui-node-modules:
