<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Bill Character - Explaining Pose -->
  <!-- Bill/Scroll body -->
  <rect x="50" y="40" width="100" height="160" rx="10" ry="10" fill="#f9f3e8" stroke="#333" stroke-width="2"/>
  
  <!-- Text lines on the bill -->
  <line x1="65" y1="70" x2="135" y2="70" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="85" x2="135" y2="85" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="100" x2="135" y2="100" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="115" x2="135" y2="115" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="130" x2="115" y2="130" stroke="#aaa" stroke-width="2"/>
  
  <!-- Bill rolled-up edges -->
  <path d="M50,40 Q45,55 50,70 V190 Q45,175 50,160" fill="#e6dfd1" stroke="#333" stroke-width="2"/>
  <path d="M150,40 Q155,55 150,70 V190 Q155,175 150,160" fill="#e6dfd1" stroke="#333" stroke-width="2"/>
  
  <!-- Face -->
  <circle cx="100" cy="60" r="15" fill="#f9f3e8" stroke="#333" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="93" cy="57" r="3" fill="#333"/>
  <circle cx="107" cy="57" r="3" fill="#333"/>
  
  <!-- Smile - Talking -->
  <path d="M90,65 Q100,68 110,65" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Arms - One pointing up -->
  <path d="M50,100 Q30,115 25,135" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M150,100 Q165,80 170,60" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Legs -->
  <path d="M75,200 Q70,220 65,230" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M125,200 Q130,220 135,230" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stamp -->
  <circle cx="125" cy="160" r="15" fill="#ff6b6b" opacity="0.8"/>
  <text x="125" y="164" font-family="Arial" font-size="10" fill="white" text-anchor="middle">ACT</text>
  
  <!-- Speech Bubble -->
  <path d="M145,40 Q170,30 180,50 Q190,70 170,80 L160,90 L165,75 Q150,85 140,75 Q130,65 145,40" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="155" y="60" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Did you</text>
  <text x="155" y="70" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">know?</text>
</svg>
