<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Bill Character - Thinking Pose -->
  <!-- Bill/Scroll body -->
  <rect x="50" y="40" width="100" height="160" rx="10" ry="10" fill="#f9f3e8" stroke="#333" stroke-width="2"/>
  
  <!-- Text lines on the bill -->
  <line x1="65" y1="70" x2="135" y2="70" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="85" x2="135" y2="85" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="100" x2="135" y2="100" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="115" x2="135" y2="115" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="130" x2="115" y2="130" stroke="#aaa" stroke-width="2"/>
  
  <!-- Bill rolled-up edges -->
  <path d="M50,40 Q45,55 50,70 V190 Q45,175 50,160" fill="#e6dfd1" stroke="#333" stroke-width="2"/>
  <path d="M150,40 Q155,55 150,70 V190 Q155,175 150,160" fill="#e6dfd1" stroke="#333" stroke-width="2"/>
  
  <!-- Face - tilted to the side -->
  <circle cx="100" cy="60" r="15" fill="#f9f3e8" stroke="#333" stroke-width="2"/>
  
  <!-- Eyes - looking up thoughtfully -->
  <circle cx="93" cy="55" r="3" fill="#333"/>
  <circle cx="107" cy="55" r="3" fill="#333"/>
  
  <!-- Mouth - contemplative -->
  <path d="M95,65 Q100,64 105,65" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Arms - one on chin thinking -->
  <path d="M50,100 Q30,90 35,70" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M150,100 Q170,115 175,135" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Legs - crossed -->
  <path d="M75,200 Q85,215 95,220" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M125,200 Q115,215 100,220" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stamp -->
  <circle cx="125" cy="160" r="15" fill="#ff6b6b" opacity="0.8"/>
  <text x="125" y="164" font-family="Arial" font-size="10" fill="white" text-anchor="middle">ACT</text>
  
  <!-- Thought Bubble -->
  <circle cx="140" cy="30" r="5" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="25" r="8" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="165" cy="20" r="12" fill="white" stroke="#333" stroke-width="1"/>
</svg>
