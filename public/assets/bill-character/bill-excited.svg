<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Bill Character - Excited Pose -->
  <!-- Bill/Scroll body -->
  <rect x="50" y="40" width="100" height="160" rx="10" ry="10" fill="#f9f3e8" stroke="#333" stroke-width="2"/>
  
  <!-- Text lines on the bill -->
  <line x1="65" y1="70" x2="135" y2="70" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="85" x2="135" y2="85" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="100" x2="135" y2="100" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="115" x2="135" y2="115" stroke="#aaa" stroke-width="2"/>
  <line x1="65" y1="130" x2="115" y2="130" stroke="#aaa" stroke-width="2"/>
  
  <!-- Bill rolled-up edges -->
  <path d="M50,40 Q45,55 50,70 V190 Q45,175 50,160" fill="#e6dfd1" stroke="#333" stroke-width="2"/>
  <path d="M150,40 Q155,55 150,70 V190 Q155,175 150,160" fill="#e6dfd1" stroke="#333" stroke-width="2"/>
  
  <!-- Face -->
  <circle cx="100" cy="60" r="15" fill="#f9f3e8" stroke="#333" stroke-width="2"/>
  
  <!-- Eyes - wide with excitement -->
  <circle cx="93" cy="57" r="4" fill="#333"/>
  <circle cx="107" cy="57" r="4" fill="#333"/>
  
  <!-- Big smile -->
  <path d="M90,65 Q100,75 110,65" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Arms - both up in excitement -->
  <path d="M50,100 Q35,80 25,60" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M150,100 Q165,80 175,60" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Legs - bouncing -->
  <path d="M75,200 Q70,210 65,215" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <path d="M125,200 Q130,210 135,215" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stamp -->
  <circle cx="125" cy="160" r="15" fill="#ff6b6b" opacity="0.8"/>
  <text x="125" y="164" font-family="Arial" font-size="10" fill="white" text-anchor="middle">ACT</text>
  
  <!-- Excitement lines -->
  <line x1="130" y1="30" x2="140" y2="20" stroke="#333" stroke-width="1.5"/>
  <line x1="150" y1="35" x2="160" y2="25" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="40" x2="180" y2="30" stroke="#333" stroke-width="1.5"/>
  <text x="155" y="45" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Wow!</text>
</svg>
