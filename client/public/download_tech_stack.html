<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Act Up Technical Stack - Download</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        #content {
            background-color: white;
            padding: 40px;
        }
        h1, h2, h3 {
            color: #1a365d;
            margin-top: 1.5em;
        }
        h1 {
            font-size: 2.2em;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        h2 {
            font-size: 1.8em;
            margin-top: 1.8em;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }
        h3 {
            font-size: 1.4em;
            margin-top: 1.5em;
        }
        p, ul, ol {
            margin-bottom: 1em;
        }
        strong {
            font-weight: 600;
        }
        ul {
            list-style-type: disc;
            padding-left: 2em;
        }
        ol {
            list-style-type: decimal;
            padding-left: 2em;
        }
        code {
            background-color: #f7fafc;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex flex-col items-center justify-center py-6">
        <h1 class="text-4xl font-bold text-center mb-8">Act Up Technical Stack</h1>
        <div class="bg-white shadow-lg rounded-lg mb-8">
            <div id="content" class="p-8"></div>
        </div>
        <div class="flex space-x-4">
            <button id="downloadPdf" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-300">
                Download as PDF
            </button>
            <a href="/" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-300">
                Return to App
            </a>
        </div>
    </div>

    <script>
        // Fetch the Markdown file
        fetch('act_up_technical_stack.md')
            .then(response => response.text())
            .then(markdown => {
                // Convert Markdown to HTML
                document.getElementById('content').innerHTML = marked.parse(markdown);
                
                // Set up PDF download
                document.getElementById('downloadPdf').addEventListener('click', function() {
                    const content = document.getElementById('content');
                    
                    // Configure PDF options
                    const options = {
                        margin: [15, 15, 15, 15],
                        filename: 'ActUp_Technical_Stack.pdf',
                        image: { type: 'jpeg', quality: 0.98 },
                        html2canvas: { scale: 2 },
                        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                    };
                    
                    // Generate and download PDF
                    html2pdf().set(options).from(content).save();
                });
            })
            .catch(error => {
                console.error('Error loading markdown:', error);
                document.getElementById('content').innerHTML = `<p class="text-red-500">Error loading technical stack information. Please try again later.</p>`;
            });
    </script>
</body>
</html>
